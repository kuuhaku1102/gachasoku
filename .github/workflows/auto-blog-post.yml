name: Auto Blog Post - Daily SEO Articles

on:
  schedule:
    # 毎日午前10時（JST）に実行 = UTC 1:00
    - cron: '0 1 * * *'
  workflow_dispatch:  # 手動実行も可能

permissions:
  contents: write  # リポジトリへの書き込み権限

jobs:
  generate-and-post:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install openai requests markdown
      
      - name: Generate and post article
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          WP_SITE_URL: ${{ secrets.WP_SITE_URL }}
          WP_USER: ${{ secrets.WP_USER }}
          WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
        run: |
          cd scripts
          python auto_blog.py
      
      - name: Commit and push article data
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto: 記事生成 [$(date '+%Y-%m-%d %H:%M:%S')]"
          git push
